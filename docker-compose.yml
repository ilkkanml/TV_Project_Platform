services:
  mysql:
    image: mysql:8.4
    container_name: tv_platform_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: tv_platform_root_password
      MYSQL_DATABASE: tv_project_platform
      MYSQL_USER: tv_platform
      MYSQL_PASSWORD: tv_platform_password
    ports:
      - "3306:3306"
    volumes:
      - tv_platform_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u tv_platform --password=tv_platform_password"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: tv_platform_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - tv_platform_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin:5
    container_name: tv_platform_phpmyadmin
    restart: unless-stopped
    profiles:
      - tools
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: tv_platform
      PMA_PASSWORD: tv_platform_password
    ports:
      - "5050:80"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  tv_platform_mysql_data:
  tv_platform_redis_data: